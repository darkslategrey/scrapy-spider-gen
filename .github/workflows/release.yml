name: release

on:
  push:
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: lint + build + test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Pack dry-run (sanity)
        run: npm pack --dry-run

      - name: Verify tarball does not leak scrapy-spider-gen-omp/
        run: |
          set -e
          TGZ="$(npm pack | tail -n 1)"
          if tar -tzf "$TGZ" | grep -q "scrapy-spider-gen-omp/"; then
            echo "::error::tarball leaks scrapy-spider-gen-omp/"
            tar -tzf "$TGZ" | grep "scrapy-spider-gen-omp" || true
            exit 1
          fi
          echo "Tarball clean: $TGZ"
          echo "--- contents ---"
          tar -tzf "$TGZ" | sort

  publish:
    name: publish to npm
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    environment: npm-publish
    permissions:
      contents: write   # pour la release GitHub
      packages: write   # garde-fou si GH Packages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify npm login
        run: npm whoami

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify on registry
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          echo "Checking $PKG@$VER on registry…"
          npm view "$PKG@$VER" version
          npm view "$PKG" dist-tags

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
